<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Charal Screamer</title>
  <link rel="stylesheet" href="/public/style.css">

</head>
<body>

<div id="cam-wrap">
  <img id="cam" src="" alt="webcam">
  <div id="cam-overlay"></div>

  <div id="hud">

<div id="top-bar">
    <div id="logo">
      <div class="logo-stack">
        <img class="logo-charal"
             src="https://www.charal.fr/wp-content/themes/charal/images/charal.webp"
             alt="Logo Charal">
  
        <img class="logo-charal-sticky"
             src="https://www.charal.fr/wp-content/themes/charal/images/vivons-fort.webp"
             alt="Vivons Fort">
      </div>
  
      <div id="logo-title">CHARAL SCREAMER</div>
    </div>
  
    <div id="round-badge">ESSAI <span id="round-num">0</span>/3</div>
  </div>
  
    <div id="center-area">
      <div id="phase-label">PRET A CRIER ?</div>
      <div id="countdown" style="display:none"></div>
      <div id="cta">Appuie sur le buzzer et hurle "CHARAL !"
      </div>
    </div>
    <div id="bottom">
      <div id="meter-wrap">
        <div id="meter-header">
          <div>
            <span id="db-val" style="color:#fff">—</span>
            <span id="db-unit">dB(A)</span>
          </div>
          <div id="db-label">NIVEAU MICRO</div>
        </div>
        <div id="bar-track"><div id="bar-fill"></div></div>
        <div id="chart-wrap">
          <canvas id="chart" role="img" aria-label="Courbe niveau sonore"></canvas>
        </div>
      </div>
      <div id="scores">
        <div class="score-card" id="s0" onclick="startRound();">
          <div class="score-num" id="sv0">—</div>
          <div class="score-lbl" id="sl0">ESSAI 1</div>
        </div>
        <div class="score-card" id="s1" onclick="playKaraoke();">
          <div class="score-num" id="sv1">—</div>
          <div class="score-lbl" id="sl1">ESSAI 2</div>
        </div>
        <div class="score-card" id="s2">
          <div class="score-num" id="sv2">—</div>
          <div class="score-lbl" id="sl2">ESSAI 3</div>
        </div>
      </div>
    </div>
  </div>

  <div id="result-overlay">
    <img id="qr-code" style="display:none;" />
    <div id="result-title">MEILLEUR SCORE</div>
    <div id="result-score">—</div>
    <div id="result-sub">dB(A) — t'as tout donné ?</div>
    <button id="btn-restart" onclick="resetGame()">REJOUER</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* ---------------------------------------------------------
   CONFIG
--------------------------------------------------------- */
const PI_IP   = window.location.hostname;
const WS_URL  = `ws://${PI_IP}:${window.location.port || 3000}`;
const CAM_URL = `http://${PI_IP}:8080/?action=stream`;

document.getElementById("cam").src = CAM_URL;

const ROUND_DURATION = 4000;
const COUNTDOWN_FROM = 3;
const CHART_POINTS   = 40;

let ws=null,currentDb=0,roundActive=false,roundMax=0;
let roundNum=0,scores=[null,null,null],gameOver=false;
let chartData=Array(CHART_POINTS).fill(null);

//document.querySelector('link[href*="/public/style.css"]').href = "/public/style.css?v=" + Date.now();

window.addEventListener("DOMContentLoaded", () => {
  const link = document.querySelector('link[href*="public/style.css"]');
  console.log(link); // doit afficher <link ...>
  if (link) {
    link.href = "/public/style.css";
  }
});


/* ---------------------------------------------------------
   CHART
--------------------------------------------------------- */
const chart = new Chart(document.getElementById('chart'), {
  type:'line',
  data:{
    labels:Array(CHART_POINTS).fill(''),
    datasets:[{
      data:chartData,
      borderColor:'#EF9F27',
      borderWidth:2,
      pointRadius:0,
      tension:0.4,
      fill:true,
      backgroundColor:'rgba(239,159,39,0.15)'
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    animation:false,
    plugins:{legend:{display:false},tooltip:{enabled:false}},
    scales:{x:{display:false},y:{display:false,min:30,max:110}}
  }
});

/* ---------------------------------------------------------
   SCREEN CAPTURE (desktopCapturer)
--------------------------------------------------------- */
let screenStream = null;
let screenReady = false;
let recorder = null;
let chunks = [];

async function autoStartScreenCapture() {
  try {
    const sources = await window.capture.get();
    const source = sources[0];

    screenStream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        mandatory: {
          chromeMediaSource: "desktop",
          chromeMediaSourceId: source.id,
          maxFrameRate: 30
        }
      }
    });

    screenReady = true;
    console.log("Capture écran OK");

  } catch (err) {
    console.error("Erreur capture écran :", err);
  }
}

window.addEventListener("load", () => {
  autoStartScreenCapture();
});


function stopRealRecordingAfterDelay() {
    setTimeout(() => {
        console.log("Arrêt 2 secondes après le cri");
        realRecorder.stop();
    }, 2000); // 2 secondes
}

function showQRCode(filename) {
    const qr = document.getElementById("qr-code");
    //qr.src = `https://snt-savary.fr:3000/qr?file=${filename}`;
    qr.src = "http://snt-savary.fr:3000/qr?file=round_3.webm";
    qr.style.display = "block";
}


/* ---------------------------------------------------------
   AUDIO : micro de la caméra (deviceId fixe)
--------------------------------------------------------- */
async function getAudioStream() {
  // 4K Web Camera, USB Audio-Front output / input
  const deviceId = "0d02b7cc5620979d331d2627826a2ace0560f004af7616fb38e42225bbfa8397";

  const stream = await navigator.mediaDevices.getUserMedia({
    audio: { deviceId },
    video: false
  });

  console.log("Audio OK :", stream);
  return stream;
}

/* ---------------------------------------------------------
   SCREEN RECORDER (fusion audio + vidéo)
--------------------------------------------------------- */
function startScreenRecorder() {
  if (!screenReady || !screenStream || !screenStream.getVideoTracks().length) {
    console.error("Recorder impossible : screenStream vide !");
    return;
  }

  chunks = [];

  getAudioStream().then(audioStream => {
    const finalStream = new MediaStream([
      ...screenStream.getVideoTracks(),
      ...audioStream.getAudioTracks()
    ]);

    recorder = new MediaRecorder(finalStream, {
      mimeType: "video/webm; codecs=vp9,opus"
    });

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      
      window.screamer.recordingFinished();
      console.log("Saving to file");
      blob.arrayBuffer().then(buffer => {
        window.electron.saveVideo(buffer, `round_${roundNum}.webm`);
        console.log("Saved");
      });
    };

    recorder.start();
    console.log("Recorder démarré avec AUDIO + VIDEO");
  }).catch(err => {
    console.error("Impossible de démarrer l'audio :", err);
  });
}

/* ---------------------------------------------------------
   WEBSOCKET / AUDIO
--------------------------------------------------------- */
function getColor(db){
  return db<60?'#1D9E75':db<80?'#EF9F27':'#E24B4A';
}

function connectWS(){
  ws=new WebSocket(WS_URL);
  ws.onmessage=(e)=>{
    const data=JSON.parse(e.data);
    console.log(data.type);
    if(data.type==='button_press'){
      console.log(data);
      if(!gameOver)startRound();
      else {
        resetGame();
        window.screamer.recordingFinished();
        console.log("reset led");
      }
      return;
    }
    const{dbSPL}=data;
    currentDb=dbSPL;
    if(roundActive&&dbSPL>roundMax)roundMax=dbSPL;
    updateMeter(dbSPL);
  };
  ws.onclose=()=>setTimeout(connectWS,2000);
  ws.onerror=()=>ws.close();
}

function updateMeter(db){
  const color=getColor(db);
  const el=document.getElementById('db-val');
  el.textContent=db.toFixed(1);
  el.style.color=color;

  const pct=Math.max(0,Math.min(100,((db-30)/80)*100));
  const bar=document.getElementById('bar-fill');
  bar.style.width=pct+'%';
  bar.style.background=color;

  chartData.shift();
  chartData.push(db);
  chart.data.datasets[0].data=[...chartData];
  chart.update('none');
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function playKaraoke() {
  const cta = document.getElementById('cta');
  cta.style.fontSize = "100px";
  cta.textContent = 'CHAAARAAAAAAL !!!';

  cta.classList.remove("karaoke");
  void cta.offsetWidth; // reset
  cta.classList.add("karaoke");
    
    
}


/* ---------------------------------------------------------
   GAME LOGIC
--------------------------------------------------------- */
async function startRound(){
  if(gameOver||roundNum>=3)return;

  console.log("StartRound");

  for(let i=0;i<3;i++)document.getElementById('s'+i).classList.remove('active');
  document.getElementById('s'+roundNum).classList.add('active');
  document.getElementById('sl'+roundNum).classList.add('active-lbl');

  document.getElementById('phase-label').style.display='none';
  document.getElementById('cta').textContent='PREPARE-TOI...';


  const cdEl=document.getElementById('countdown');
  cdEl.style.display='block';

  // Démarrer l'enregistrement vidéo 2 sec avant le countdown
  startScreenRecorder();
  console.log("Enregistrement vidéo démarré");

  // Attendre 2 secondes avant le countdown visible
  //await sleep(2000);

  for(let c=COUNTDOWN_FROM;c>=1;c--){
    cdEl.textContent=c;
    cdEl.style.color=c===0?'#E24B4A':'#fff';
    await sleep(1000);
  }

  cdEl.textContent='CRIE !';
  cdEl.style.color='#E24B4A';
  
  //document.getElementById('cta').textContent='"CHAAARAAAAAAL !!!"';
  
  /*const cta = document.getElementById('cta');
  cta.textContent = 'CHAAARAAAAAAL !!!';
  cta.setAttribute("data-text", 'CHAAARAAAAAAL !!!');
  cta.style.fontSize = "80px";
  // Reset animation (au cas où elle a déjà été jouée)
  cta.classList.remove("karaoke");
  // Forcer le navigateur à recalculer le style
  //void cta.offsetWidth;
  // Déclencher l’animation
  cta.classList.add("karaoke");*/
  
  playKaraoke();



  roundActive=true;
  roundMax=0;

  let remaining=ROUND_DURATION;
  while(remaining>0){
    const sec=Math.ceil(remaining/1000);
    cdEl.textContent=sec>0?sec:'!';
    await sleep(100);
    remaining-=100;
  }

  // Attendre 2 secondes après le cri avant d'arrêter l'enregistrement
  await sleep(2000);

  roundActive=false;
  if (recorder)
    recorder.stop();

  const score=Math.round(roundMax*10)/10;
  scores[roundNum]=score;

  const sv=document.getElementById('sv'+roundNum);
  sv.textContent=score.toFixed(1);
  sv.classList.add('filled');

  document.getElementById('s'+roundNum).classList.remove('active');
  document.getElementById('s'+roundNum).classList.add('done');
  document.getElementById('sl'+roundNum).classList.remove('active-lbl');

  roundNum++;
  document.getElementById('round-num').textContent=roundNum;

  cdEl.style.display='none';
  document.getElementById('phase-label').style.display='block';

  if(roundNum>=3){
    endGame();
  } else {
    document.getElementById('phase-label').textContent='ESSAI '+(roundNum+1)+' !';
    
    document.getElementById('cta').style.fontSize = "clamp(14px, 4.5vw, 52px)";
    document.getElementById('cta').textContent='Appuie sur le buzzer et hurle "CHARAL !"';
    const cta = document.getElementById('cta');
    cta.classList.remove("karaoke");
    void cta.offsetWidth; // reset

    //const cta = document.getElementById('cta');
    //cta.classList.remove("karaoke");
    //document.getElementById('cta').style.fontSize = "clamp(14px, 4.5vw, 52px)";
  }
}

function endGame(){
  gameOver=true;
  const best=Math.max(...scores.filter(s=>s!==null));
  const bestIdx=scores.indexOf(best);

  document.getElementById('sv'+bestIdx).classList.add('gold');
  document.getElementById('s'+bestIdx).classList.remove('done');
  document.getElementById('s'+bestIdx).classList.add('best');

  document.getElementById('result-score').textContent=best.toFixed(1)+' dB';
  document.getElementById('result-overlay').classList.add('show');
    
  showQRCode("round_3.webm");
  
}

function resetGame(){
  
  //location.reload(true);
  
  gameOver=false;
  roundNum=0;
  scores=[null,null,null];

  document.getElementById('round-num').textContent='0';
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('phase-label').textContent='PRET A CRIER ?';
  document.getElementById('phase-label').style.display='block';
  
  document.getElementById('cta').textContent='Appuie sur le buzzer et hurle "CHARAL !"';
  //document.getElementById('cta').style.fontSize = "clamp(14px, 4.5vw, 52px)";
  
  for(let i=0;i<3;i++){
    document.getElementById('sv'+i).textContent='—';
    document.getElementById('sv'+i).classList.remove('filled','gold');
    document.getElementById('s'+i).className='score-card';
    document.getElementById('sl'+i).className='score-lbl';
  }
  
  
  
}

connectWS();
</script>
</body>
</html>
