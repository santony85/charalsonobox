<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonomètre</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0f;color:#e8e6e0;font-family:'DM Sans',sans-serif;min-height:100vh;padding:2rem}
  h1{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:0.15em;color:#555;text-transform:uppercase;margin-bottom:2rem}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.5rem}
  .card{background:#111118;border:0.5px solid #222;border-radius:12px;padding:1.25rem}
  .card-label{font-size:11px;letter-spacing:0.1em;color:#555;text-transform:uppercase;margin-bottom:0.5rem}
  .card-value{font-family:'Space Mono',monospace;font-size:28px;font-weight:700}
  .main-card{grid-column:1/-1;padding:2rem;position:relative;overflow:hidden}
  .db-display{font-family:'Space Mono',monospace;font-size:80px;font-weight:700;line-height:1;margin-bottom:0.5rem;transition:color 0.3s}
  .db-unit{font-size:18px;color:#555;margin-left:4px}
  .bar-track{width:100%;height:8px;background:#1a1a24;border-radius:4px;margin:1.5rem 0;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width 0.15s ease,background 0.3s}
  .chart-wrap{position:relative;height:120px;margin-top:1rem}
  canvas{width:100%!important}
  .status{font-size:12px;color:#333;display:flex;align-items:center;gap:8px}
  .dot{width:6px;height:6px;border-radius:50%;background:#1d9e75;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .weighting{font-family:'Space Mono',monospace;font-size:11px;color:#444;position:absolute;top:1.25rem;right:1.25rem}
</style>
</head>
<body>
<h1>&#9679; Sonomètre — Raspberry Pi 5</h1>

<div class="grid">
  <div class="card main-card">
    <div class="weighting">dB(A)</div>
    <div class="card-label">Niveau instantané</div>
    <div id="db-display" class="db-display">—<span class="db-unit">dB</span></div>
    <div class="bar-track"><div id="bar" class="bar-fill" style="width:0%;background:#1d9e75"></div></div>
    <div class="chart-wrap">
      <canvas id="chart" role="img" aria-label="Historique du niveau sonore"></canvas>
    </div>
    <div class="status" style="margin-top:1rem">
      <div id="dot" class="dot" style="background:#555"></div>
      <span id="status-text">En attente de connexion…</span>
    </div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <div class="card-label">Leq</div>
    <div id="leq" class="card-value" style="color:#378add">—</div>
    <div style="font-size:11px;color:#444;margin-top:4px">niveau équivalent</div>
  </div>
  <div class="card">
    <div class="card-label">Max</div>
    <div id="maxval" class="card-value" style="color:#e24b4a">—</div>
    <div style="font-size:11px;color:#444;margin-top:4px">depuis le démarrage</div>
  </div>
  <div class="card">
    <div class="card-label">Min</div>
    <div id="minval" class="card-value" style="color:#1d9e75">—</div>
    <div style="font-size:11px;color:#444;margin-top:4px">depuis le démarrage</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const HISTORY = 60;
const data = Array(HISTORY).fill(null);
const labels = Array(HISTORY).fill('');
let maxVal = -Infinity, minVal = Infinity;
const history = [];

const chart = new Chart(document.getElementById('chart'), {
  type: 'line',
  data: {
    labels,
    datasets: [{
      data,
      borderColor: '#378add',
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.3,
      fill: true,
      backgroundColor: (ctx) => {
        const g = ctx.chart.ctx.createLinearGradient(0,0,0,120);
        g.addColorStop(0,'rgba(55,138,221,0.25)');
        g.addColorStop(1,'rgba(55,138,221,0)');
        return g;
      }
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: { legend: { display: false }, tooltip: { enabled: false } },
    scales: {
      x: { display: false },
      y: {
        min: 30, max: 110,
        grid: { color: 'rgba(255,255,255,0.04)' },
        ticks: {
          color: '#444',
          font: { family: 'Space Mono', size: 10 },
          callback: v => v + 'dB'
        },
        border: { display: false }
      }
    }
  }
});

function getColor(db) {
  if (db < 55) return '#1d9e75';
  if (db < 70) return '#efa627';
  if (db < 85) return '#d85a30';
  return '#e24b4a';
}

function computeLeq(arr) {
  if (!arr.length) return 0;
  const sum = arr.reduce((a, b) => a + Math.pow(10, b / 10), 0);
  return 10 * Math.log10(sum / arr.length);
}

function update(dbSPL) {
  const color = getColor(dbSPL);

  // Affichage principal
  document.getElementById('db-display').innerHTML =
    `<span style="color:${color}">${dbSPL.toFixed(1)}</span><span class="db-unit">dB</span>`;

  // Barre
  const pct = Math.max(0, Math.min(100, ((dbSPL - 30) / 80) * 100));
  const bar = document.getElementById('bar');
  bar.style.width = pct + '%';
  bar.style.background = color;

  // Historique chart
  data.shift(); data.push(dbSPL);
  chart.update('none');

  // Stats
  history.push(dbSPL);
  if (history.length > 300) history.shift();
  maxVal = Math.max(maxVal, dbSPL);
  minVal = Math.min(minVal, dbSPL);

  document.getElementById('leq').textContent = computeLeq(history).toFixed(1) + ' dB';
  document.getElementById('maxval').textContent = maxVal.toFixed(1) + ' dB';
  document.getElementById('minval').textContent = minVal.toFixed(1) + ' dB';
}

// WebSocket
function connect() {
  const ws = new WebSocket(`ws://${location.host}`);

  ws.onopen = () => {
    document.getElementById('dot').style.background = '#1d9e75';
    document.getElementById('status-text').textContent = 'Connecté';
  };

  ws.onmessage = (e) => {
    const { dbSPL } = JSON.parse(e.data);
    update(dbSPL);
  };

  ws.onclose = () => {
    document.getElementById('dot').style.background = '#e24b4a';
    document.getElementById('status-text').textContent = 'Déconnecté — reconnexion dans 2s…';
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();
}

connect();
</script>
</body>
</html>
